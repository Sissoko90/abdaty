# Stack de PRODUCTION (VPS), déployée dans /opt/backend/abdaty/docker-compose.yml.
#
# Structure attendue sur le VPS :
#   /opt/backend/abdaty/        → ce compose, Dockerfile (runtime), app.jar, .env, application.yml
#   /opt/backend/observabilite/ → configs Prometheus / Grafana / Loki (réf. ../observabilite)
#   /var/www/frontend/          → build Next.js (servi NATIVEMENT, hors de ce compose)
#
# Le BACKEND tourne ici en Docker (image construite depuis le jar). Le FRONTEND
# tourne en natif (systemd) et joint le backend via 127.0.0.1:8080.
#
#   cd /opt/backend/abdaty && docker compose up -d --build
#
# Les credentials viennent du .env (substitution compose + env_file backend).
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: abdaty/backend:prod
    container_name: abdaty-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"     # exposé en local ; nginx + frontend natif s'y connectent
    env_file:
      - ./.env                    # secrets (JWT, MAIL, ADMIN, DB_*) — présent sur le VPS
    environment:
      # Câblage infra (surcharge les valeurs localhost du .env pour le réseau Docker).
      ENVIRONMENT: production
      DB_VENDOR: postgresql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_MIGRATION_PATH: db/migration/postgresql
      SQL_INIT_MODE: always
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:29092
      ZIPKIN_ENABLED: "true"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      VAULT_ENABLED: "false"
    volumes:
      - backend-logs:/app/logs
      - backend-uploads:/app/uploads
      - /opt/geoip:/opt/geoip:ro                 # bases MaxMind (partagées sur le VPS)
      - ./application.yml:/app/application.yml:ro # override de config (présent sur le VPS)
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  postgres:
    image: postgres:15-alpine
    container_name: abdaty-postgres
    restart: unless-stopped
    environment:
      # Mêmes valeurs que celles lues par le backend (depuis .env via substitution).
      POSTGRES_DB: ${DB_NAME:-abdatydb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: abdaty-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: abdaty-kafka
    restart: unless-stopped
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      CLUSTER_ID: abdaty-kafka-cluster-1
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: abdaty-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ../observabilite/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: abdaty-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-true}
      GF_SMTP_HOST: ${GF_SMTP_HOST:-smtp.gmail.com:587}
      GF_SMTP_USER: ${MAIL_USERNAME:-}
      GF_SMTP_PASSWORD: ${MAIL_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${MAIL_USERNAME:-alerts@abdatytch.com}
      GF_SMTP_FROM_NAME: ${GF_SMTP_FROM_NAME:-Abdaty Monitoring}
      GF_SMTP_STARTTLS_POLICY: MandatoryStartTLS
    volumes:
      - grafana-data:/var/lib/grafana
      - ../observabilite/provisioning:/etc/grafana/provisioning
      - ../observabilite/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:2.9.8
    container_name: abdaty-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ../observabilite/loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki

  promtail:
    image: grafana/promtail:2.9.8
    container_name: abdaty-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ../observabilite/loki/promtail-config.yml:/etc/promtail/promtail-config.yml
      - backend-logs:/var/log/abdaty:ro
      - promtail-positions:/tmp
    depends_on:
      - loki

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: abdaty-zipkin
    restart: unless-stopped
    ports:
      - "127.0.0.1:9411:9411"

  vault:
    image: hashicorp/vault:latest
    container_name: abdaty-vault
    restart: unless-stopped
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
    command: server -dev

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-positions:
  vault-data:
  backend-logs:
  backend-uploads:
