# Stack Abdaty Technologie — déploiement par ARTEFACTS (à copier dans /opt/backend/abdaty).
#
# Le backend tourne depuis le JAR envoyé (./app.jar via ./Dockerfile) et le frontend
# depuis le BUILD standalone envoyé (./frontend via ./frontend/Dockerfile). Aucun code
# source requis sur le VPS.
#
# Fichiers attendus à côté de ce compose :
#   ./app.jar               (envoyé par la CI)
#   ./Dockerfile            (backend runtime — COPY app.jar)
#   ./frontend/             (build standalone envoyé par la CI)
#   ./frontend/Dockerfile   (frontend runtime — node server.js)
#   ./.env                  (secrets + valeurs prod)
#   ./observabilite/        (configs Prometheus/Grafana/Loki)
#
#   docker compose up -d --build     (ou docker-compose up -d --build)

services:
  # ───────────────────────────── Applications ─────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile          # backend runtime : COPY app.jar
    image: abdaty/backend:prod
    container_name: abdaty-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - ./.env                         # secrets backend (JWT, MAIL, ADMIN, DB_*…)
    environment:
      ENVIRONMENT: production
      DB_VENDOR: postgresql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_MIGRATION_PATH: db/migration/postgresql
      SQL_INIT_MODE: always
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:29092
      ZIPKIN_ENABLED: "true"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      VAULT_ENABLED: "false"
    volumes:
      - backend-logs:/app/logs
      - backend-uploads:/app/uploads
      - /opt/geoip:/opt/geoip:ro       # bases MaxMind (partagées sur le VPS)
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - abdaty-network

  frontend:
    build:
      context: ./frontend              # build standalone envoyé + frontend/Dockerfile
    image: abdaty/frontend:prod
    container_name: abdaty-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ./.env                         # NEXTAUTH_URL / NEXTAUTH_SECRET
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://backend:8080/api/v1   # le front (SSR) joint le backend en interne
    depends_on:
      - backend
    networks:
      - abdaty-network

  # ───────────────────────────── Données ─────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: abdaty-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-abdatydb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - abdaty-network

  redis:
    image: redis:7-alpine
    container_name: abdaty-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - abdaty-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: abdaty-kafka
    restart: unless-stopped
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      CLUSTER_ID: abdaty-kafka-cluster-1
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - abdaty-network

  # ───────────────────────────── Observabilité ─────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: abdaty-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observabilite/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - abdaty-network

  grafana:
    image: grafana/grafana:latest
    container_name: abdaty-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    env_file:
      - ./.env
    environment:
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: smtp.gmail.com:587
      GF_SMTP_USER: ${MAIL_USERNAME:-}
      GF_SMTP_PASSWORD: ${MAIL_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${MAIL_USERNAME:-alerts@abdatytch.com}
      GF_SMTP_STARTTLS_POLICY: MandatoryStartTLS
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observabilite/provisioning:/etc/grafana/provisioning
      - ./observabilite/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
    networks:
      - abdaty-network

  loki:
    image: grafana/loki:2.9.8
    container_name: abdaty-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observabilite/loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki
    networks:
      - abdaty-network

  promtail:
    image: grafana/promtail:2.9.8
    container_name: abdaty-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./observabilite/loki/promtail-config.yml:/etc/promtail/promtail-config.yml
      - backend-logs:/var/log/abdaty:ro
      - promtail-positions:/tmp
    depends_on:
      - loki
    networks:
      - abdaty-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: abdaty-zipkin
    restart: unless-stopped
    ports:
      - "127.0.0.1:9411:9411"
    networks:
      - abdaty-network

  vault:
    image: hashicorp/vault:latest
    container_name: abdaty-vault
    restart: unless-stopped
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
    command: server -dev
    networks:
      - abdaty-network

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-positions:
  vault-data:
  backend-logs:
  backend-uploads:

networks:
  abdaty-network:
    driver: bridge
