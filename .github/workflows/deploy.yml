name: Déploiement Production

# Sur push vers main : tests (gate), puis sur le VPS on met le code à jour et on
# (re)construit la stack avec LE MÊME docker-compose.yml qu'en dev — front + back en
# Docker + infra + observabilité. Les valeurs de prod (URLs, secrets) viennent des
# .env présents sur le VPS.
#
# Les workflows CI (ci.yml) et Sécurité (security.yml) tournent EN PARALLÈLE.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ───────────────────────────── Tests (gate) ─────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — checks
        working-directory: frontend
        run: |
          npm ci
          npm run i18n:check
          npm run type-check
          npm run lint

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Backend — tests unitaires
        working-directory: backend
        run: ./mvnw -B -ntp test

  # ───────────────────────────── Déploiement ─────────────────────────────
  deploy:
    name: Déploiement VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Mise à jour du code + rebuild de la stack (docker compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH || '/opt/backend/abdaty' }}"
            echo "→ Récupération du code"
            git fetch --all
            git reset --hard origin/main
            echo "→ Build + (re)démarrage de la stack (front + back + infra)"
            docker compose up -d --build --remove-orphans
            echo "→ Nettoyage des images orphelines"
            docker image prune -f
            echo "→ État"
            docker compose ps
