name: Déploiement Production

# Sur push vers main : tests (gate), puis ENVOI DU SOURCE sur le VPS (archive propre,
# sans node_modules/.next/target) et `docker compose up -d --build` — les conteneurs
# sont construits sur le VPS avec LES MÊMES Dockerfiles qu'en local (backend/Dockerfile,
# frontend/Dockerfile). Aucun jar/build pré-construit : tout est cohérent dev = prod.
#
# CI (ci.yml) et Sécurité (security.yml) tournent en parallèle sur le même push.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - name: Frontend — checks
        working-directory: frontend
        run: |
          npm ci
          npm run i18n:check
          npm run type-check
          npm run lint
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17', cache: 'maven' }
      - name: Backend — tests
        working-directory: backend
        run: ./mvnw -B -ntp test

  deploy:
    name: Déploiement VPS (build sur place)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # Archive du SOURCE nécessaire au build (sans dépendances/artefacts lourds).
      - name: Préparer l'archive source
        run: |
          tar czf src.tar.gz \
            --exclude='frontend/node_modules' --exclude='frontend/.next' \
            --exclude='backend/target' --exclude='.git' \
            backend frontend observabilite docker-compose.yml

      - name: Envoi de l'archive → /opt/backend/abdaty
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "src.tar.gz"
          target: "${{ vars.DEPLOY_PATH || '/opt/backend/abdaty' }}"
          overwrite: true

      - name: Extraction + docker compose up -d --build
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH || '/opt/backend/abdaty' }}"
            echo "→ Extraction du source (préserve les .env existants)"
            tar xzf src.tar.gz && rm -f src.tar.gz
            # Compatible Compose v2 ("docker compose") et v1 ("docker-compose").
            if docker compose version >/dev/null 2>&1; then DC="docker compose"; else DC="docker-compose"; fi
            echo "→ $DC up -d --build"
            $DC up -d --build --remove-orphans
            docker image prune -f
            $DC ps
