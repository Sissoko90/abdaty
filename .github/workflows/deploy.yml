name: Déploiement Production

# Sur push vers main : tests + build des artefacts (jar backend + build frontend
# standalone), puis ENVOI sur le VPS (sans git pull) et rebuild des conteneurs.
#   - /opt/backend/abdaty/app.jar     ← jar backend (envoyé)
#   - /opt/backend/abdaty/frontend/   ← build Next.js standalone (envoyé)
#   - docker-compose.yml + Dockerfile + .env : déjà présents sur le VPS (one-time)
#
# CI (ci.yml) et Sécurité (security.yml) tournent en parallèle sur le même push.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & envoi VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ───────────── Build frontend (standalone) ─────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — install, checks, build
        working-directory: frontend
        run: |
          npm ci
          npm run i18n:check
          npm run type-check
          npm run lint
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://abdatytch.com/api/v1
          NEXT_PUBLIC_SITE_URL: https://abdatytch.com
          NEXTAUTH_SECRET: ci-build-secret-not-used-at-runtime
          NEXTAUTH_URL: https://abdatytch.com

      - name: Assembler le bundle frontend standalone
        run: |
          rm -rf dist-frontend && mkdir -p dist-frontend/.next
          cp -r frontend/.next/standalone/. dist-frontend/
          cp -r frontend/.next/static dist-frontend/.next/static
          cp -r frontend/public dist-frontend/public

      # ───────────── Build backend (jar + tests) ─────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Backend — tests + package (jar)
        working-directory: backend
        run: ./mvnw -B -ntp package

      - name: Préparer le jar
        run: cp backend/target/*-SNAPSHOT.jar app.jar

      # ───────────── Envoi sur le VPS (SCP, pas de git pull) ─────────────
      - name: Envoi du jar → /opt/backend/abdaty/app.jar
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app.jar"
          target: "${{ vars.DEPLOY_PATH || '/opt/backend/abdaty' }}"
          overwrite: true

      - name: Envoi du build frontend → /opt/backend/abdaty/frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist-frontend"
          target: "${{ vars.DEPLOY_PATH || '/opt/backend/abdaty' }}/frontend"
          strip_components: 1
          overwrite: true

      # ───────────── Rebuild + redémarrage (compose déjà sur le VPS) ─────────────
      - name: docker compose up -d --build
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH || '/opt/backend/abdaty' }}"
            docker compose up -d --build --remove-orphans
            docker image prune -f
            docker compose ps
