name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Annule les exécutions précédentes encore en cours sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Parité des clés de traduction FR/EN (échoue si divergence).
      - name: i18n parity
        run: npm run i18n:check

      # Vérification de typage TypeScript.
      - name: Type-check
        run: npm run type-check

      # Lint bloquant : 0 erreur (les `any` restants sont des warnings non bloquants
      # à résorber progressivement).
      - name: Lint
        run: npm run lint

      # Build de production (Next 16 / Turbopack) : compilation + validation des
      # types. Next 16 ne lance plus ESLint au build (étape Lint dédiée ci-dessus).
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXTAUTH_SECRET: ci-build-secret-not-used-at-runtime
          NEXTAUTH_URL: http://localhost:3000

  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # Tests UNITAIRES uniquement (le @SpringBootTest qui exige MySQL/Kafka/Vault
      # est @Disabled) → pas besoin d'infrastructure, exécution rapide et stable.
      - name: Unit tests
        run: ./mvnw -B -ntp test
