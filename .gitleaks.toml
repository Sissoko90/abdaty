# Configuration gitleaks — hérite des règles par défaut et ajoute une allowlist
# pour éviter les faux positifs (fichiers d'exemple, fixtures de test).
[extend]
useDefault = true

[allowlist]
description = "Chemins et valeurs sans secret réel"
paths = [
  '''\.env\.example$''',
  '''.*\.md$''',
  '''.*/__tests__/.*''',
  '''.*\.test\.(ts|tsx|js|jsx)$''',
  # Documentation et exemples d'API SMS / docs : clés d'EXEMPLE, pas de vrais secrets.
  '''frontend/features/sms-api/.*''',
  '''frontend/features/docs/.*''',
  '''frontend/app/.*/sms-api/.*''',
  '''frontend/app/.*/sms-subscribers/.*''',
]
regexes = [
  # Placeholders / exemples évidents (ex. your-api-key, example-secret, sk_test_...).
  '''(?i)(your|example|placeholder|changeme|dummy|test|sample)[-_].*(key|secret|token|password)''',
  '''(?i)(api[-_]?key|secret|token)['":\s=]+(your|example|placeholder|xxxx|dummy|<[^>]+>)''',
  # Domaine d'exemple utilisé dans les snippets de doc.
  '''api\.abdaty-tech\.com''',
]
