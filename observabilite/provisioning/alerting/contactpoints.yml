apiVersion: 1

# Point de contact des alertes. Par défaut : email (nécessite la config SMTP de
# Grafana, cf. variables GF_SMTP_* dans docker-compose). Remplacer l'adresse et/ou
# ajouter un receiver Slack/webhook selon vos besoins.
contactPoints:
  - orgId: 1
    name: abdaty-default
    receivers:
      - uid: abdaty-email
        type: email
        settings:
          addresses: maksissoko07@gmail.com
        disableResolveMessage: false

# Politique de notification : toutes les alertes vont au point de contact par défaut,
# regroupées par nom d'alerte.
policies:
  - orgId: 1
    receiver: abdaty-default
    group_by: ['alertname', 'severity']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
